<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleepLog</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>😴 SleepLog</h1>
        <p class="subtitle">毎日の睡眠を記録しよう</p>
    </header>

    <!-- 今日の睡眠 -->
    <section class="card">

        <h2>今日の睡眠</h2>

        <div class="sleep-time" id="sleepTime">
            --時間--分
        </div>

        <div class="times">

            <div>
                <p>🌙 就寝</p>
                <h3 id="sleepStart">--:--</h3>
            </div>

            <div>
                <p>☀️ 起床</p>
                <h3 id="wakeTime">--:--</h3>
            </div>

        </div>

    </section>

    <!-- 統計 -->
    <section class="card">

        <h2>統計</h2>

        <div class="average">

            <div>
                <p>今週平均</p>
                <h3 id="weekAverage">--時間</h3>
            </div>

            <div>
                <p>今月平均</p>
                <h3 id="monthAverage">--時間</h3>
            </div>

        </div>

    </section>

    <!-- ボタン -->

    <button class="sleep-btn" id="sleepBtn">
        🌙 おやすみ
    </button>

    <button class="wake-btn" id="wakeBtn">
        ☀️ 起床
    </button>

    <!-- 履歴 -->

    <section class="history">

        <h2>最近の記録</h2>

        <div id="historyList">

            <div class="history-card">

                <div class="history-date">
                    記録はまだありません
                </div>

            </div>

        </div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
