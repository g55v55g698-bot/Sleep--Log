<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleepLog</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <h1>🌙 SleepLog</h1>

    <!-- 今日の睡眠 -->
    <section class="card">

        <h2>😴 今日の睡眠</h2>

        <div class="times">

            <div>
                <p>就寝</p>
                <h3 id="sleepStart">--:--</h3>
            </div>

            <div>
                <p>起床</p>
                <h3 id="wakeTime">--:--</h3>
            </div>

        </div>

        <div class="result">

            <h3>睡眠時間</h3>

            <p class="sleep-time">--時間--分</p>

        </div>

        <div class="buttons">

            <button class="sleep-btn">
                🌙 おやすみ
            </button>

            <button class="wake-btn">
                ☀️ 起床
            </button>

        </div>

    </section>

    <!-- 統計 -->
    <section class="card">

        <h2>📊 統計</h2>

        <div class="average">

            <div>
                <p>今週平均</p>
                <h3 id="weekAverage">--時間</h3>
            </div>

            <div>
                <p>今月平均</p>
                <h3 id="monthAverage">--時間</h3>
            </div>

        </div>

    </section>

    <!-- グラフ -->
    <section class="card">

        <h2>📈 睡眠グラフ</h2>

        <div class="chart-buttons">

            <button id="weekChartBtn" class="chart-tab active">
                7日
            </button>

            <button id="monthChartBtn" class="chart-tab">
                30日
            </button>

        </div>

        <canvas id="sleepChart"></canvas>

    </section>

    <!-- 履歴 -->
    <section class="card">

        <h2>📅 最近の記録</h2>

        <div id="historyList">

            <p class="empty">
                まだ記録がありません
            </p>

        </div>

    </section>

</div>

<script src="script.js"></script>
<script src="chart.js"></script>

</body>
</html>
