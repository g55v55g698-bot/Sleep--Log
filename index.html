<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SleepLog</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>😴 SleepLog</h1>

<div class="card">

<h2>今日の睡眠</h2>

<p class="sleep-time">7時間24分</p>

<div class="times">

<div>

<p>🌙 就寝</p>

<h3>23:48</h3>

</div>

<div>

<p>☀️ 起床</p>

<h3>07:12</h3>

</div>

</div>

</div>

<div class="card">

<div class="average">

<div>

<p>今週平均</p>

<h3>7時間08分</h3>

</div>

<div>

<p>今月平均</p>

<h3>6時間57分</h3>

</div>

</div>

</div>

<button class="sleep-btn">
🌙 おやすみ
</button>

<button class="wake-btn">
☀️ 起床
</button>

<div class="nav">

<div>🏠<br>ホーム</div>

<div>📈<br>グラフ</div>

<div>📅<br>履歴</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
